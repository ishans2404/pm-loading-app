services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plate-app-v2
    dns:
      - 10.145.10.20
    ports:
      - "8703:8703"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
    # For development, uncomment below and comment out the CMD in Dockerfile for hot reload:
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    # command: npm run dev
    # ports:
    #   - "5173:5173"  # Vite dev server port
    restart: unless-stopped

server {
  listen 8703;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy for BSP APIs to avoid browser-side CORS.
  location /api-proxy/ {
    # Trailing slash makes nginx replace "/api-proxy/" with "/".
    proxy_pass https://bspapp.sail-bhilaisteel.com/;
    proxy_set_header Host bspapp.sail-bhilaisteel.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name bspapp.sail-bhilaisteel.com;
    proxy_ssl_verify off;

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
